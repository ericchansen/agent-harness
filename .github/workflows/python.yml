name: Python checks

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/python.yml"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
      - "tools.json"
  pull_request:
    paths:
      - ".github/workflows/python.yml"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
      - "tools.json"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Run tests
        run: python -m pytest -q
